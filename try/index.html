<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Arxyne — Try (coming soon)</title>
<meta name="description" content="The interactive Arxyne platform demo is on its way.">
<meta property="og:title" content="Arxyne — Try (coming soon)">
<meta property="og:description" content="The interactive Arxyne platform demo is on its way.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://arxyne.com/try/">
<!-- Analytics: consent-gated. See /assets/consent.js -->
<script src="/assets/consent.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 1.5rem 3rem;
  }
  .logo {
    width: 320px;
    max-width: 75vw;
    height: auto;
    margin-bottom: 2rem;
  }
  .badge {
    display: inline-block;
    color: #00E5FF;
    border: 1px solid #00E5FF;
    border-radius: 999px;
    padding: 0.3rem 0.9rem;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-weight: 800;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: #FFF;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 1rem;
    max-width: 640px;
  }
  .lede {
    color: #999;
    font-size: clamp(1rem, 2.2vw, 1.1rem);
    line-height: 1.7;
    max-width: 540px;
    margin-bottom: 2.5rem;
  }
  .actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    display: inline-block;
    padding: 0.75rem 1.8rem;
    border-radius: 6px;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
    transition: all 0.2s;
    letter-spacing: 0.01em;
    border: 1px solid #00E5FF;
  }
  .btn-primary {
    background: #00E5FF;
    color: #0A0A0A;
  }
  .btn-primary:hover {
    background: #00c8e0;
    transform: translateY(-1px);
  }
  .btn-secondary {
    background: transparent;
    color: #00E5FF;
  }
  .btn-secondary:hover {
    background: rgba(0, 229, 255, 0.1);
    transform: translateY(-1px);
  }
  footer {
    text-align: center;
    padding: 2rem 1.5rem;
    border-top: 1px solid #111;
  }
  footer p {
    color: #444;
    font-size: 0.78rem;
    margin-bottom: 0.5rem;
  }
  footer a {
    color: #666;
    text-decoration: none;
    font-size: 0.78rem;
    margin: 0 0.5rem;
  }
  footer a:hover { color: #00E5FF; }
</style>
</head>
<body>

  <main>
    <img src="https://raw.githubusercontent.com/arxynehq/.github/main/profile/assets/logo.png" alt="Arxyne" class="logo">
    <span class="badge">Coming soon</span>
    <h1>The interactive demo is on its way.</h1>
    <p class="lede">
      In the meantime, watch the platform run end-to-end on a reference
      product.
    </p>
    <div class="actions">
      <a href="/demo/" class="btn btn-primary">Watch the demo</a>
    </div>
  </main>

  <footer>
    <p>© 2026 Arxyne Ltd</p>
    <p>
      <a href="/privacy/">Privacy</a> ·
      <a href="/cookies/">Cookies</a> ·
      <a href="#" data-action="open-consent">Cookie settings</a>
    </p>
  </footer>

</body>
</html>
